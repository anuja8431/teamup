{% extends 'base.html' %}
{% block title %}Sign Up — TeamUp{% endblock %}
{% block content %}
<div style="min-height:85vh;display:flex;align-items:center;justify-content:center;padding:2rem">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:2rem">
      <h1 style="color:var(--accent);margin-bottom:.35rem">TeamUp</h1>
      <p class="muted">Create your account to get started</p>
    </div>
    <div class="card">
      <h2 style="font-size:1.2rem;margin-bottom:1.5rem">Create account</h2>
      <form method="POST">
        <div class="form-group">
          <label>Full name</label>
          <input type="text" name="name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="Min. 6 characters">
        </div>
        <button class="btn btn-primary" style="width:100%" type="submit">Create account</button>
      </form>
      <p class="muted" style="text-align:center;margin-top:1.25rem;font-size:.875rem">
        Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent);text-decoration:none;font-weight:500">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
<script src="script.js"></script>
