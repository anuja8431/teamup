<!DOCTYPE html>
<html lang="en">
<head>
    <title>Browse Users – TeamUp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-glow: rgba(37,99,235,0.15);
            --accent: #06d6a0;
            --accent-glow: rgba(6,214,160,0.15);
            --warn: #f97316;
            --danger: #ef4444;
            --bg: #080c14;
            --bg2: #0d1220;
            --bg3: #111827;
            --card: #0f172a;
            --card2: #131d2e;
            --border: rgba(255,255,255,0.07);
            --border-active: rgba(37,99,235,0.4);
            --text: #f0f4ff;
            --text2: #94a3b8;
            --text3: #475569;
            --sidebar-w: 256px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* SIDEBAR */
        .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border); height: 100vh; padding: 28px 20px; display: flex; flex-direction: column; position: sticky; top: 0; flex-shrink: 0; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 36px; display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); padding: 0 12px; margin-bottom: 6px; margin-top: 20px; }
        .nav-label:first-of-type { margin-top: 0; }
        .nav a { display: flex; align-items: center; gap: 10px; color: var(--text2); text-decoration: none; padding: 10px 12px; border-radius: 10px; margin-bottom: 2px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .nav a:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav a.active { background: var(--primary-glow); color: var(--primary-light); border: 1px solid var(--border-active); }
        .nav a .nav-icon { font-size: 16px; width: 20px; text-align: center; }
        .nav a .badge { margin-left: auto; background: var(--primary); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
        .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); }
        .user-chip { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px; background: var(--bg3); border: 1px solid var(--border); }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .user-info { overflow: hidden; }
        .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 11px; color: var(--text3); }

        /* MAIN */
        .main { flex: 1; padding: 32px 36px; overflow-y: auto; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        .header-left h2 { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        .header-left p { font-size: 14px; color: var(--text2); margin-top: 4px; }
        .header-right { display: flex; align-items: center; gap: 12px; }

        /* SEARCH & FILTERS */
        .search-bar { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px; transition: 0.2s; }
        .search-bar:focus-within { border-color: var(--border-active); box-shadow: 0 0 0 3px var(--primary-glow); }
        .search-bar input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; width: 240px; font-family: inherit; }
        .search-bar input::placeholder { color: var(--text3); }

        .filters-section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px; margin-bottom: 24px; }
        .filters-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
        .filter-chips { display: flex; flex-wrap: wrap; gap: 7px; }
        .filter-chip { padding: 5px 13px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .filter-chip:hover { border-color: var(--text3); color: var(--text); }
        .filter-chip.active { background: var(--primary-glow); border-color: var(--border-active); color: var(--primary-light); }
        .filter-divider { width: 1px; height: 50px; background: var(--border); flex-shrink: 0; }

        /* RESULTS BAR */
        .results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .results-count { font-size: 13px; color: var(--text2); }
        .sort-select { background: var(--card); border: 1px solid var(--border); color: var(--text2); font-size: 12px; padding: 7px 12px; border-radius: 9px; outline: none; cursor: pointer; font-family: inherit; }

        /* USER CARDS GRID */
        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

        .user-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; transition: all 0.2s; cursor: pointer; animation: fadeUp 0.4s ease both; }
        .user-card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }

        .uc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
        .uc-avatar { width: 52px; height: 52px; border-radius: 50%; font-size: 18px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .uc-match { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .match-pct { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); }
        .match-label { font-size: 10px; color: var(--text3); font-weight: 500; }

        .uc-name { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 3px; }
        .uc-role { font-size: 12.5px; color: var(--text2); margin-bottom: 4px; }
        .uc-loc { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
        .uc-bio { font-size: 12.5px; color: var(--text2); line-height: 1.55; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .uc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .tag { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
        .tag.blue { background: var(--primary-glow); color: var(--primary-light); border-color: var(--border-active); }
        .tag.green { background: var(--accent-glow); color: var(--accent); border-color: rgba(6,214,160,0.25); }

        .uc-actions { display: flex; gap: 8px; }
        .btn { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, var(--primary), #1d4ed8); color: white; border: none; padding: 9px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 12.5px; font-family: inherit; transition: all 0.2s; box-shadow: 0 4px 14px rgba(37,99,235,0.3); white-space: nowrap; flex: 1; justify-content: center; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.42); }
        .btn-ghost { background: var(--bg3); box-shadow: none; border: 1px solid var(--border); color: var(--text2); }
        .btn-ghost:hover { background: rgba(255,255,255,0.06); color: var(--text); box-shadow: none; transform: none; }

        /* AVAILABILITY DOT */
        .avail-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .avail-dot.open { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
        .avail-dot.busy { background: var(--warn); }
        .avail-dot.closed { background: var(--text3); }

        /* PROFILE DRAWER */
        .profile-drawer { position: fixed; right: -400px; top: 0; bottom: 0; width: 380px; background: var(--bg2); border-left: 1px solid var(--border); z-index: 90; transition: right 0.3s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; padding: 28px 24px; }
        .profile-drawer.open { right: 0; }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 89; opacity: 0; pointer-events: none; transition: 0.3s; }
        .drawer-overlay.open { opacity: 1; pointer-events: all; }
        .close-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: 0.15s; }
        .close-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
        .drawer-header { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .profile-hero { text-align: center; padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        .profile-avatar-lg { width: 80px; height: 80px; border-radius: 50%; font-size: 28px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
        .profile-name { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .profile-role { font-size: 13.5px; color: var(--text2); margin-bottom: 6px; }
        .profile-loc { font-size: 12.5px; color: var(--text3); margin-bottom: 14px; }
        .profile-match { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-glow); border: 1px solid rgba(6,214,160,0.25); color: var(--accent); padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
        .section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; margin-top: 20px; }
        .profile-bio { font-size: 13px; color: var(--text2); line-height: 1.65; }
        .skill-grid { display: flex; flex-wrap: wrap; gap: 7px; }
        .drawer-actions { display: flex; gap: 10px; margin-top: 24px; }
        .btn-full { flex: 1; }

        /* PAGINATION */
        .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 32px; }
        .page-btn { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 9px; background: var(--card); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.15s; font-family: inherit; display: flex; align-items: center; justify-content: center; }
        .page-btn:hover { border-color: var(--text3); color: var(--text); }
        .page-btn.active { background: var(--primary-glow); border-color: var(--border-active); color: var(--primary-light); }
        .page-btn.arrow { font-size: 16px; }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); grid-column: 1/-1; }
        .empty-state .e-icon { font-size: 40px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }

        /* TOAST */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 18px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px; animation: toastIn 0.3s ease; max-width: 320px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
        @keyframes toastIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { to { transform: translateX(40px); opacity: 0; } }
        .toast.success { border-color: rgba(6,214,160,0.3); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo"><div class="logo-icon">🔗</div> TeamUp</div>
    <div class="nav-label">Menu</div>
    <div class="nav">
        <a href="dashboard.html"><span class="nav-icon">⚡</span> Dashboard</a>
        <a href="browse-users.html" class="active"><span class="nav-icon">🔍</span> Browse Users <span class="badge">24</span></a>
        <a href="my-posts.html"><span class="nav-icon">📋</span> My Posts</a>
        <a href="requests.html"><span class="nav-icon">📬</span> Requests <span class="badge">2</span></a>
    </div>
    <div class="nav-label">Account</div>
    <div class="nav">
        <a href="profile.html"><span class="nav-icon">👤</span> Profile</a>
        <a href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
        <a href="/login"><span class="nav-icon">🚪</span> Logout</a>
    </div>
    <div class="sidebar-footer">
        <div class="user-chip">
            <div class="user-avatar">A</div>
            <div class="user-info">
                <div class="user-name">Aryan Kumar</div>
                <div class="user-role">Frontend Dev</div>
            </div>
        </div>
    </div>
</div>

<div class="main">
    <div class="header">
        <div class="header-left">
            <h2>Browse Users 🔍</h2>
            <p>Discover talented developers, designers, and builders to team up with.</p>
        </div>
        <div class="header-right">
            <div class="search-bar">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search by name, skill, role…" oninput="applyFilters()">
            </div>
        </div>
    </div>

    <!-- FILTERS -->
    <div class="filters-section">
        <div class="filters-row">
            <div class="filter-group">
                <div class="filter-group-label">Role</div>
                <div class="filter-chips" id="roleFilters">
                    <button class="filter-chip active" onclick="setFilter('role','all',this)">All</button>
                    <button class="filter-chip" onclick="setFilter('role','Frontend',this)">Frontend</button>
                    <button class="filter-chip" onclick="setFilter('role','Backend',this)">Backend</button>
                    <button class="filter-chip" onclick="setFilter('role','UI/UX',this)">UI/UX</button>
                    <button class="filter-chip" onclick="setFilter('role','Mobile',this)">Mobile</button>
                    <button class="filter-chip" onclick="setFilter('role','AI/ML',this)">AI/ML</button>
                    <button class="filter-chip" onclick="setFilter('role','DevOps',this)">DevOps</button>
                </div>
            </div>
            <div class="filter-divider"></div>
            <div class="filter-group">
                <div class="filter-group-label">Availability</div>
                <div class="filter-chips" id="availFilters">
                    <button class="filter-chip active" onclick="setFilter('avail','all',this)">All</button>
                    <button class="filter-chip" onclick="setFilter('avail','open',this)">🟢 Open</button>
                    <button class="filter-chip" onclick="setFilter('avail','busy',this)">🟡 Busy</button>
                </div>
            </div>
            <div class="filter-divider"></div>
            <div class="filter-group">
                <div class="filter-group-label">Location</div>
                <div class="filter-chips" id="locFilters">
                    <button class="filter-chip active" onclick="setFilter('loc','all',this)">All India</button>
                    <button class="filter-chip" onclick="setFilter('loc','Bengaluru',this)">Bengaluru</button>
                    <button class="filter-chip" onclick="setFilter('loc','Delhi',this)">Delhi</button>
                    <button class="filter-chip" onclick="setFilter('loc','Pune',this)">Pune</button>
                    <button class="filter-chip" onclick="setFilter('loc','Mumbai',this)">Mumbai</button>
                </div>
            </div>
        </div>
    </div>

    <div class="results-bar">
        <div class="results-count" id="resultsCount">Showing 8 users</div>
        <select class="sort-select" onchange="applyFilters()" id="sortSelect">
            <option value="match">Sort by: Best Match</option>
            <option value="name">Sort by: Name</option>
            <option value="newest">Sort by: Newest</option>
        </select>
    </div>

    <div class="users-grid" id="usersGrid"></div>

    <div class="pagination">
        <button class="page-btn arrow">←</button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn arrow">→</button>
    </div>
</div>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- PROFILE DRAWER -->
<div class="profile-drawer" id="profileDrawer">
    <div class="drawer-header">
        <button class="close-btn" onclick="closeDrawer()">✕</button>
    </div>
    <div id="drawerContent"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const users = [
    { id:1, name:"Rahul Sharma", initials:"RS", color:"#2563eb", role:"Frontend Developer", category:"Frontend", skills:["React","TypeScript","Tailwind","Next.js"], bio:"Passionate about building accessible and performant web apps. 3 years exp, open to hackathons and startups.", match:85, location:"Bengaluru", avail:"open" },
    { id:2, name:"Anjali Mehta", initials:"AM", color:"#06d6a0", role:"Full-Stack Developer", category:"Backend", skills:["Python","Flask","PostgreSQL","Redis"], bio:"Love building REST APIs and data pipelines. Looking for a frontend partner for SaaS ideas.", match:78, location:"Pune", avail:"open" },
    { id:3, name:"Karan Singh", initials:"KS", color:"#f97316", role:"UI/UX Designer", category:"UI/UX", skills:["Figma","UI/UX","Prototyping","Framer"], bio:"Design-focused thinker who codes. Loves turning complex problems into clean interfaces.", match:73, location:"Delhi", avail:"busy" },
    { id:4, name:"Priya Nair", initials:"PN", color:"#8b5cf6", role:"Mobile Developer", category:"Mobile", skills:["Flutter","Firebase","Dart","iOS"], bio:"Building mobile-first apps. Interested in health-tech and edtech projects.", match:68, location:"Bengaluru", avail:"open" },
    { id:5, name:"Dev Patel", initials:"DP", color:"#ec4899", role:"ML Engineer", category:"AI/ML", skills:["Python","TensorFlow","NLP","PyTorch"], bio:"ML researcher who loves turning models into products. Hackathon enthusiast.", match:62, location:"Ahmedabad", avail:"open" },
    { id:6, name:"Meera Joshi", initials:"MJ", color:"#14b8a6", role:"Backend Developer", category:"Backend", skills:["Node.js","MongoDB","Docker","AWS"], bio:"DevOps-aware backend engineer. Love scaling systems and solving infra challenges.", match:71, location:"Mumbai", avail:"open" },
    { id:7, name:"Rohan Verma", initials:"RV", color:"#f43f5e", role:"DevOps Engineer", category:"DevOps", skills:["Kubernetes","Docker","CI/CD","Terraform"], bio:"Infrastructure nerd. Love deploying at scale and automating everything.", match:55, location:"Delhi", avail:"busy" },
    { id:8, name:"Sneha Gupta", initials:"SG", color:"#a78bfa", role:"AI/ML Engineer", category:"AI/ML", skills:["Python","Scikit-learn","LangChain","OpenAI"], bio:"Building LLM-powered apps. Excited about AI x product use cases.", match:80, location:"Bengaluru", avail:"open" },
];

let filters = { role:'all', avail:'all', loc:'all' };

function setFilter(type, val, btn) {
    filters[type] = val;
    const group = { role:'roleFilters', avail:'availFilters', loc:'locFilters' }[type];
    document.querySelectorAll(`#${group} .filter-chip`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
}

function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const sort = document.getElementById('sortSelect').value;

    let result = users.filter(u => {
        const matchRole = filters.role === 'all' || u.category === filters.role;
        const matchAvail = filters.avail === 'all' || u.avail === filters.avail;
        const matchLoc = filters.loc === 'all' || u.location === filters.loc;
        const matchSearch = !q || u.name.toLowerCase().includes(q) || u.role.toLowerCase().includes(q) || u.skills.some(s => s.toLowerCase().includes(q));
        return matchRole && matchAvail && matchLoc && matchSearch;
    });

    if (sort === 'match') result.sort((a,b) => b.match - a.match);
    else if (sort === 'name') result.sort((a,b) => a.name.localeCompare(b.name));

    document.getElementById('resultsCount').textContent = `Showing ${result.length} user${result.length !== 1 ? 's' : ''}`;
    renderUsers(result);
}

function renderUsers(list) {
    const grid = document.getElementById('usersGrid');
    if (!list.length) {
        grid.innerHTML = `<div class="empty-state"><div class="e-icon">🔍</div><p>No users match your filters.<br>Try adjusting your criteria.</p></div>`;
        return;
    }
    grid.innerHTML = list.map((u, i) => `
        <div class="user-card" style="animation-delay:${i*0.05}s" onclick="openProfile(${u.id})">
            <div class="uc-top">
                <div class="uc-avatar" style="background:${u.color}">${u.initials}</div>
                <div class="uc-match">
                    <div class="match-pct">${u.match}%</div>
                    <div class="match-label">match</div>
                </div>
            </div>
            <div class="uc-name">${u.name}</div>
            <div class="uc-role">${u.role}</div>
            <div class="uc-loc">
                <span class="avail-dot ${u.avail}"></span>
                ${u.avail === 'open' ? 'Available' : 'Busy'} · 📍 ${u.location}
            </div>
            <div class="uc-bio">${u.bio}</div>
            <div class="uc-tags">
                ${u.skills.slice(0,3).map(s => `<span class="tag">${s}</span>`).join('')}
                ${u.skills.length > 3 ? `<span class="tag">+${u.skills.length-3}</span>` : ''}
            </div>
            <div class="uc-actions" onclick="event.stopPropagation()">
                <button class="btn" onclick="sendConnect(${u.id},'${u.name}')">Connect</button>
                <button class="btn btn-ghost" onclick="openProfile(${u.id})">View Profile</button>
            </div>
        </div>
    `).join('');
}

function openProfile(id) {
    const u = users.find(x => x.id === id);
    if (!u) return;
    document.getElementById('drawerContent').innerHTML = `
        <div class="profile-hero">
            <div class="profile-avatar-lg" style="background:${u.color}">${u.initials}</div>
            <div class="profile-name">${u.name}</div>
            <div class="profile-role">${u.role}</div>
            <div class="profile-loc">📍 ${u.location} · <span class="avail-dot ${u.avail}" style="vertical-align:middle"></span>${u.avail === 'open' ? 'Open to collaborate' : 'Currently busy'}</div>
            <div class="profile-match">⚡ ${u.match}% skill match</div>
        </div>
        <div class="section-title">About</div>
        <p class="profile-bio">${u.bio}</p>
        <div class="section-title">Skills</div>
        <div class="skill-grid">
            ${u.skills.map(s => `<span class="tag blue">${s}</span>`).join('')}
        </div>
        <div class="drawer-actions">
            <button class="btn btn-full" onclick="sendConnect(${u.id},'${u.name}')">✉️ Connect</button>
            <button class="btn btn-ghost btn-full">💬 Message</button>
        </div>
    `;
    document.getElementById('profileDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
    document.getElementById('profileDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
}

function sendConnect(id, name) {
    showToast(`✉️ Request sent to ${name}!`, 'success');
}

function showToast(msg, type='success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = msg;
    c.appendChild(t);
    setTimeout(() => { t.style.animation='toastOut 0.3s ease forwards'; setTimeout(()=>t.remove(),300); }, 3000);
}

applyFilters();
</script>
</body>
</html>
